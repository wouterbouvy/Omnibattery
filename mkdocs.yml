site_name: Omnibattery
site_description: Home Assistant custom integration for pluggable solar batteries (Marstek Venus and Zendure SolarFlow)
site_author: ffunes
site_url: https://ffunes.github.io/omnibattery/
repo_url: https://github.com/ffunes/omnibattery
repo_name: ffunes/omnibattery
edit_uri: edit/main/site-docs/

docs_dir: site-docs
site_dir: _site

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro / Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro / Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Installation: Instalación
            Configuration: Configuración
            Overview: Resumen
            Main sensor: Sensor principal
            Batteries: Baterías
            Time slots: Franjas horarias
            Excluded devices: Dispositivos excluidos
            Predictive charging: Carga predictiva
            Time Slot mode: Modo Franja Horaria
            Dynamic Pricing mode: Modo Precio Dinámico
            Real-Time Price mode: Modo Precio en Tiempo Real
            Advanced options: Opciones avanzadas
            Features: Funcionalidades
            PD Controller: Controlador PD
            Multi-battery management: Gestión multi-batería
            Daily consumption estimate: Estimación de consumo diario
            Weekly full charge: Carga semanal completa
            Cell balance monitor: Monitor de equilibrio de celdas
            Peak shaving: Peak shaving
            Solar charge delay: Retraso de carga solar
            Load exclusion: Exclusión de cargas
            Hourly net balance: Balance neto horario
            Technical reference: Referencia técnica
            Architecture: Arquitectura
            Battery driver requirements: Requisitos para drivers de batería
            Modbus registers: Registros Modbus
            HA entities: Entidades HA
            Troubleshooting: Solución de problemas
            Changelog: Changelog

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ffunes/omnibattery
    - icon: fontawesome/solid/mug-hot
      link: https://buymeacoffee.com/ffunes
  version:
    provider: mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration:
      - Overview: configuration/index.md
      - Main sensor: configuration/main-sensor.md
      - Batteries: configuration/batteries.md
      - Time slots: configuration/time-slots.md
      - Excluded devices: configuration/excluded-devices.md
      - Predictive charging:
          - Overview: configuration/predictive-charging/index.md
          - Time Slot mode: configuration/predictive-charging/time-slot.md
          - Dynamic Pricing mode: configuration/predictive-charging/dynamic-pricing.md
          - Real-Time Price mode: configuration/predictive-charging/real-time-price.md
      - Advanced options: configuration/advanced.md
  - Features:
      - PD Controller: features/pd-controller.md
      - Multi-battery management: features/multi-battery.md
      - Daily consumption estimate: features/consumption-estimate.md
      - Weekly full charge: features/weekly-full-charge.md
      - Cell balance monitor: features/cell-balance-monitor.md
      - Peak shaving: features/peak-shaving.md
      - Solar charge delay: features/solar-charge-delay.md
      - Load exclusion: features/load-exclusion.md
      - Hourly net balance: features/hourly-net-balance.md
  - Technical reference:
      - Architecture: reference/architecture.md
      - Battery driver requirements: reference/driver-requirements-template.md
      - Modbus registers: reference/modbus-registers.md
      - HA entities: reference/entities.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
