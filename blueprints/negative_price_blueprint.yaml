blueprint:
  name: "Marstek Venus - Negative Price Grid Charging"
  description: >
    Automatically charge your Marstek Venus battery from the grid when prices
    drop below a configurable threshold, and discharge before the most expensive
    hour of the day to sell at the highest price.

    Between the charge and discharge thresholds, the automation does nothing
    (dead zone), letting the battery manage itself normally.

    You must select the Marstek Venus entities for each battery you want to
    control. If you have multiple batteries, select all corresponding entities
    in each multi-selector. The blueprint reads each battery's configured max
    limits from the selected max charge/discharge power entities.

    The daily peak hour is computed from your price sensor's day-ahead forecast
    attributes — no additional sensors needed.
  domain: automation
  source_url: "https://github.com/ffunes/Marstek-Venus-Energy-Manager/blob/main/negative_price_blueprint.yaml"

  input:
    price_sensor:
      name: "Price Sensor"
      description: "Sensor providing the current electricity price with day-ahead forecast attributes (e.g. Nordpool: raw_today / raw_tomorrow)."
      selector:
        entity:
          filter:
            domain: sensor

    manual_mode_switch:
      name: "Manual Mode Switch"
      description: "The Manual Mode switch entity from the Marstek Venus integration (system-level)."
      selector:
        entity:
          filter:
            domain: switch

    force_mode_select:
      name: "Force Mode Select(s)"
      description: "The Force Mode select entity/entities from the Marstek Venus integration. Select all batteries you want to control."
      selector:
        entity:
          multiple: true
          filter:
            domain: select

    set_charge_power:
      name: "Set Charge Power Number(s)"
      description: "The Set Charge Power number entity/entities. Select all batteries you want to control."
      selector:
        entity:
          multiple: true
          filter:
            domain: number

    set_discharge_power:
      name: "Set Discharge Power Number(s)"
      description: "The Set Discharge Power number entity/entities. Select all batteries you want to control."
      selector:
        entity:
          multiple: true
          filter:
            domain: number

    max_charge_power:
      name: "Max Charge Power Number(s)"
      description: "Optional: the Max Charge Power number entity/entities to read the configured charge limit. If omitted, defaults to 2500 W."
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: number

    max_discharge_power:
      name: "Max Discharge Power Number(s)"
      description: "Optional: the Max Discharge Power number entity/entities to read the configured discharge limit. If omitted, defaults to 2500 W."
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: number

    battery_version:
      name: "Battery Version"
      description: "Select your Marstek Venus battery model so the blueprint uses the correct Force Mode option strings."
      default: "ev2_ev3"
      selector:
        select:
          options:
            - label: "Ev2 / Ev3"
              value: "ev2_ev3"
            - label: "Venus A"
              value: "va"
            - label: "Venus D"
              value: "vd"

    notify_service:
      name: "Notification Service"
      description: "Optional notification service (e.g. notify.mobile_app_your_phone). Leave empty to disable."
      default: ""
      selector:
        text:

    charge_threshold:
      name: "Charge Threshold (EUR/kWh)"
      description: "Charge from grid when price drops below this value. Between thresholds, the automation does nothing."
      default: 0
      selector:
        number:
          min: -0.5
          max: 1
          step: 0.01
          mode: box

    discharge_threshold:
      name: "Discharge Threshold (EUR/kWh)"
      description: "Allow discharge to grid when price exceeds this value. Between thresholds, the automation does nothing."
      default: 0.15
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: box

variables:
  price_sensor: !input price_sensor
  notify_service: !input notify_service
  battery_version: !input battery_version
  max_charge_power_input: !input max_charge_power
  max_discharge_power_input: !input max_discharge_power
  charge_threshold: !input charge_threshold
  discharge_threshold: !input discharge_threshold

  # Map battery version to the correct Force Mode option strings.
  charge_option: >
    {{ {'ev2_ev3': 'Charge', 'va': 'charge', 'vd': 'charge'}[battery_version] }}
  discharge_option: >
    {{ {'ev2_ev3': 'Discharge', 'va': 'discharge', 'vd': 'discharge'}[battery_version] }}
  stop_option: >
    {{ {'ev2_ev3': 'None', 'va': 'stop', 'vd': 'standby'}[battery_version] }}

  # Read each battery's configured max charge/discharge power.
  # Use the minimum to stay within limits of all selected batteries.
  # Guard against None/empty optional selectors: expand(None) explodes.
  charge_power: >
    {% set entities = max_charge_power_input if max_charge_power_input is not none and max_charge_power_input is iterable and max_charge_power_input is not string else [] %}
    {% set values = expand(entities) | map(attribute='state') | reject('in', ['unavailable','unknown','none']) | map('float', 0) | select('gt', 0) | list %}
    {{ values | min if values | length > 0 else 2500 }}

  discharge_power: >
    {% set entities = max_discharge_power_input if max_discharge_power_input is not none and max_discharge_power_input is iterable and max_discharge_power_input is not string else [] %}
    {% set values = expand(entities) | map(attribute='state') | reject('in', ['unavailable','unknown','none']) | map('float', 0) | select('gt', 0) | list %}
    {{ values | min if values | length > 0 else 2500 }}

  _all_prices: >
    {% set ns = namespace(prices=[]) %}
    {% set now_local = now() %}
    {% for source in [state_attr(price_sensor, 'raw_today'), state_attr(price_sensor, 'raw_tomorrow')] %}
      {% if source is iterable and source is not string %}
        {% for item in source %}
          {% if item is mapping and 'start' in item and 'value' in item %}
            {% set start = item.start | as_datetime | as_local %}
            {% if start >= now_local %}
              {% set ns.prices = ns.prices + [{'hour': start.hour, 'price': item.value | float(-999)}] %}
            {% endif %}
          {% endif %}
        {% endfor %}
      {% elif source is string and source | length > 0 %}
        {% set trimmed = source | trim %}
        {% if trimmed.startswith('[') and trimmed.endswith(']') %}
          {% set parsed = trimmed | from_json | default([]) %}
          {% for item in parsed %}
            {% if item is mapping and 'start' in item and 'value' in item %}
              {% set start = item.start | as_datetime | as_local %}
              {% if start >= now_local %}
                {% set ns.prices = ns.prices + [{'hour': start.hour, 'price': item.value | float(-999)}] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.prices }}

  peak_hour: >
    {% set prices = _all_prices %}
    {% if prices | length > 0 %}
      {% set sorted = prices | sort(attribute='price', reverse=True) %}
      {{ sorted[0].hour }}
    {% else %}
      12
    {% endif %}

  peak_price: >
    {% set prices = _all_prices %}
    {% if prices | length > 0 %}
      {% set sorted = prices | sort(attribute='price', reverse=True) %}
      {{ sorted[0].price | round(4) }}
    {% else %}
      0
    {% endif %}

trigger:
  - platform: time_pattern
    minutes: "/1"
    id: time_tick

condition: []

action:
  - variables:
      current_price: "{{ states(price_sensor) | float(-999) }}"

  - choose:

      # Price below charge threshold → charge from grid
      - conditions:
          - condition: trigger
            id: time_tick
          - condition: template
            value_template: "{{ current_price < charge_threshold | float }}"
          - condition: state
            entity_id: !input manual_mode_switch
            state: "off"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input manual_mode_switch

          - service: number.set_value
            target:
              entity_id: !input set_charge_power
            data:
              value: "{{ charge_power }}"

          - service: select.select_option
            target:
              entity_id: !input force_mode_select
            data:
              option: "{{ charge_option }}"

          - service: system_log.write
            data:
              level: info
              message: >
                PRICE BELOW THRESHOLD: {{ current_price }} EUR/kWh (threshold: {{ charge_threshold }}).
                Manual mode ON. Charging from grid at {{ charge_power }}W.

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_service | trim | length > 0 }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Low Price - Charging"
                      message: >
                        Price: {{ current_price }} EUR/kWh (below {{ charge_threshold }}).
                        Battery charging from grid at {{ charge_power }}W.
            default: []

      # Price above discharge threshold → stop charging (but not during peak window)
      - conditions:
          - condition: trigger
            id: time_tick
          - condition: template
            value_template: "{{ current_price > discharge_threshold | float }}"
          - condition: state
            entity_id: !input manual_mode_switch
            state: "on"
          - condition: template
            value_template: >
                {% set ph = peak_hour | int %}
                {% set h = now().hour %}
                {% set m = now().minute %}
                {% set is_pre_peak = (h + 1) % 24 == ph and m == 30 %}
                {% set is_post_peak = (h - 1) % 24 == ph and m == 0 %}
                {% set is_peak_hour = h == ph %}
                {{ not is_pre_peak and not is_peak_hour and not is_post_peak }}
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input manual_mode_switch

          - service: select.select_option
            target:
              entity_id: !input force_mode_select
            data:
              option: "{{ stop_option }}"

          - service: system_log.write
            data:
              level: info
              message: >
                Price above threshold: {{ current_price }} EUR/kWh (threshold: {{ discharge_threshold }}).
                Manual mode OFF. Automatic control resumed.

      # 30 min before peak → discharge to sell (only if peak_price > discharge_threshold)
      - conditions:
          - condition: trigger
            id: time_tick
          - condition: template
            value_template: >
              {{ (now().hour + 1) % 24 == peak_hour | int and now().minute == 30 }}
          - condition: template
            value_template: >
              {{ peak_price | float > discharge_threshold | float }}
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input manual_mode_switch

          - service: number.set_value
            target:
              entity_id: !input set_discharge_power
            data:
              value: "{{ discharge_power }}"

          - service: select.select_option
            target:
              entity_id: !input force_mode_select
            data:
              option: "{{ discharge_option }}"

          - service: system_log.write
            data:
              level: info
              message: >
                DAILY PEAK at {{ peak_hour }}:00
                (price: {{ peak_price }} EUR/kWh, threshold: {{ discharge_threshold }}).
                Manual mode ON. Discharging to sell at {{ discharge_power }}W.

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_service | trim | length > 0 }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Daily Peak - Discharging"
                      message: >
                        Peak at {{ peak_hour }}:00 ({{ peak_price }} EUR/kWh).
                        Discharging battery at {{ discharge_power }}W.
            default: []

      # 1 hour after peak → restore normal
      - conditions:
          - condition: trigger
            id: time_tick
          - condition: template
            value_template: >
              {{ (now().hour - 1) % 24 == peak_hour | int and now().minute == 0 }}
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input manual_mode_switch

          - service: select.select_option
            target:
              entity_id: !input force_mode_select
            data:
              option: "{{ stop_option }}"

          - service: system_log.write
            data:
              level: info
              message: >
                Daily peak ended. Manual mode OFF. Normal operation restored.

    default: []
